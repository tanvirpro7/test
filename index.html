<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Prevent libraries from crashing when trying to overwrite read-only window.fetch in AI Studio iframe
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() { return originalFetch; },
            set: function() { console.warn('Something tried to overwrite window.fetch. This was suppressed to prevent a crash.'); },
            configurable: true
          });
        } catch (e) {
          // If already defined or non-configurable, we can't do anything here, 
          // but usually this script running first helps.
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
